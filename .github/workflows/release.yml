# Release — on a `v*` tag, build the standalone `turbo-surf-mcp` binary for every
# platform and publish `turbo-surf` (the thin launcher npm package,
# which spawns the binary). No napi, no Node hosting Rust — same model as
# turbo-test. The Rust crates publish separately (rust-crates-publish.yml).
name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  build:
    name: build ${{ matrix.node }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: macos-14, target: aarch64-apple-darwin, node: darwin-arm64 }
          # darwin-x64 (Intel Mac) dropped: GitHub's macos-13 runners are scarce/slow
          # and stall releases. Matches the sibling repos (turbo-dom/turbo-html2pdf).
          # Apple-Silicon (darwin-arm64) covers modern Macs; Intel falls back to a clear
          # "no prebuilt binary" error (build from source).
          - { host: ubuntu-24.04, target: x86_64-unknown-linux-gnu, node: linux-x64 }
          - { host: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, node: linux-arm64 }
          - { host: windows-latest, target: x86_64-pc-windows-msvc, node: win32-x64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - name: Build the MCP binary
        run: cargo build --release -p turbo-surf-mcp --target ${{ matrix.target }} --manifest-path rust/Cargo.toml
      - name: Stage platform binary
        shell: bash
        run: |
          mkdir -p out
          cp "rust/target/${{ matrix.target }}/release/turbo-surf-mcp${{ matrix.ext }}" \
             "out/turbo-surf-mcp-${{ matrix.node }}${{ matrix.ext }}"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.node }}
          path: out/*
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, registry-url: "https://registry.npmjs.org" }
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect prebuilt binaries into bin/
        run: |
          mkdir -p bin
          find artifacts -type f -name 'turbo-surf-mcp-*' -exec cp {} bin/ \;
          chmod +x bin/* || true
          ls -la bin/
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
