# =============================================================================
# Python (PyPI) release workflow for `turbo-surf`.
#
# A SEPARATE, opt-in workflow that does NOT touch the existing npm `release.yml`
# or the crates `rust-crates-publish.yml`. It builds maturin abi3 wheels
# (CPython 3.8+, one wheel per platform) plus an sdist, and publishes them to
# PyPI on a `pyv*` tag.
#
# Gated on its own tag prefix (`pyv*`, e.g. `pyv0.2.4`) so it never fires on the
# existing `v*` npm/crates release tags, AND on the presence of the `PYPI_TOKEN`
# repository secret. Until that secret is configured the `publish` job skips with
# a clear message, so merging this file cannot trigger an accidental release.
#
# Wheels are built from rust/crates/turbo-surf-py/ (manifest + pyproject there).
# =============================================================================

name: Release (PyPI)

on:
  push:
    tags: ['pyv*'] # Python-only release tag. First: pyv0.2.4. Never `v*`.
  workflow_dispatch: # Allow a manual dry-run build with no publish.

permissions:
  contents: read

env:
  MANIFEST: rust/crates/turbo-surf-py/Cargo.toml

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build abi3 wheels across platforms + an sdist.
  #    Matrix mirrors release.yml MINUS musl (manylinux covers the common case).
  # ---------------------------------------------------------------------------
  build:
    name: build wheel ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Hosts mirror release.yml: build linux-aarch64 NATIVELY on an arm runner,
      # not manylinux+QEMU emulation — emulated builds of the V8-heavy crate stall
      # / OOM. darwin-x64 (Intel) is dropped, matching the npm release matrix.
      matrix:
        include:
          - { os: macos-14, target: aarch64 }
          - { os: ubuntu-24.04, target: x86_64, manylinux: auto }
          - { os: ubuntu-24.04-arm, target: aarch64, manylinux: auto }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # maturin-action builds the wheel from the crate's pyproject.toml. abi3
      # means ONE wheel per platform serves every CPython >= 3.8.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --manifest-path ${{ env.MANIFEST }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path rust/crates/turbo-surf-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Publish to PyPI — only on a real `pyv*` tag AND only if PYPI_TOKEN is set.
  # ---------------------------------------------------------------------------
  publish:
    name: publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pyv')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Guard on PYPI_TOKEN
        id: guard
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "PYPI_TOKEN not set — skipping publish (token not yet configured)."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
