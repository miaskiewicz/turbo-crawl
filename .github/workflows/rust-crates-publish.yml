# Publish the turbo-crawl Rust library crates to crates.io on a v* tag (mirrors
# turbo-dom's publish-crate job). Requires repo secret CARGO_REGISTRY_TOKEN.
# Published in dependency order so each dependent's version dep is already live:
#   core → view → page → render → mcp.
# (turbo-crawl-napi is a cdylib → ships to npm via rust-napi-prebuild.yml, not here.)
name: rust-crates-publish

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

defaults:
  run:
    working-directory: rust

jobs:
  publish-crates:
    name: publish-crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # cargo reads CARGO_REGISTRY_TOKEN from the env natively; `cargo publish`
      # waits for each crate to index before the next dependent publishes.
      - run: cargo publish -p turbo-crawl-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p turbo-crawl-view
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p turbo-crawl-page
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p turbo-crawl-render
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p turbo-crawl-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
